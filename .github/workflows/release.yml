# .github/workflows/release.yml
#
# GitHub Actions: tag-driven release workflow.
#
# Trigger: a new semver tag pushed to the project's default branch
# (currently `main`; the user's spec said "master" but this repo's
# HEAD branch is `main` — see `git symbolic-ref refs/remotes/origin/HEAD`).
# Conventional `v*` tags only (v0.1.0, v1.2.3, ...). Anything else is
# ignored.
#
# What this workflow produces, attached to the GitHub Release as
# downloadable assets:
#
#   mcp-confluence_<tag>_linux_amd64.tar.gz
#   mcp-confluence_<tag>_linux_arm64.tar.gz
#   mcp-confluence_<tag>.oci.tar          # OCI image (docker load -i)
#   mcp-confluence_<tag>_sbom.spdx.json   # SPDX SBOM (from `make sbom`)
#   sha256sums.txt
#
# Build path used in CI (simpler than the local pack+Paketo path; same
# artifact per the project's Dockerfile header comment):
#
#   1. `make check`  — lint + test (release fails on any red signal).
#   2. `docker buildx build` — multi-arch (linux/amd64, linux/arm64)
#      using the project's plain Dockerfile, producing a distroless
#      static binary with `-ldflags "-X main.version=<tag>"` injected.
#      This is the SAME artifact `make image` (pack + Paketo Go
#      BuildPak) produces; see the Dockerfile's header comment.
#   3. `docker save` the local image to `mcp-confluence_<tag>.oci.tar`
#      so operators without docker can `docker load -i` it.
#   4. `make sbom` — SPDX SBOM at /sbom/ for the OCI image (the
#      Paketo Go BuildPak emits this via --sbom-output-dir; the
#      Dockerfile path does too if `syft` is on PATH).
#   5. Cross-compile the standalone binary tar.gz for linux/amd64
#      and linux/arm64 via plain `CGO_ENABLED=0 GOOS=linux go build`.
#
# The 8 write-side subcommands still print the
# `!!! WARNING — EDITING FUNCTIONS MIGHT NOT BE COMPLETELY FINISHED !!!`
# banner (constrained by editingFunctionWarning in
# cmd/mcp-confluence/main.go) — this does not change the build path.

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
    branches-ignore:
      - "**"

# Allow only one concurrent release run per ref. Tag pushes from a
# back-to-back v0.1.1 -> v0.1.2 sequence shouldn't race.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Same permissions as the broad `actions: write` set; the softprops
# release action requires `contents: write` and `packages: write`.
permissions:
  contents: write
  packages: read

jobs:
  # ---------------------------------------------------------------------
  # Tests run BEFORE the release job — a failing test cancels the
  # release. Same gate as the local `make check` (lint + test).
  # ---------------------------------------------------------------------
  check:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # The cmd/mcp-confluence package's integration tests (cli_test.go,
      # ~28 tests) spawn the freshly-built binary via binaryPath(t),
      # which walks up to the project root and stat's
      # bin/mcp-confluence. Makefile `build` is NOT a dependency
      # of `test` (and shouldn't be: pkg-level unit tests are
      # hermetic), so we must run `make build` here before
      # `make check` to satisfy the integration tests. The
      # pre-built binary is also re-used by the matrix `build`
      # and `oci` jobs' first matrix target — slight win on a
      # cold cache.
      - name: make build (for integration tests)
        run: make build
      - name: make check
        run: make check

  # ---------------------------------------------------------------------
  # Build the standalone binary tarballs (linux/amd64 + linux/arm64)
  # and the OCI image (single-arch amd64 here; cross-arch docker builds
  # need QEMU + buildx on GH runners, which is slower than just
  # producing a docker-loadable .oci.tar).
  #
  # The local developer path (`make image` + pack + Paketo Go BuildPak)
  # is unchanged. The Dockerfile in this repo is the SHORTER GH Actions
  # path that produces the same artifact (static distroless binary
  # with `-X main.version=<tag>` ldflags). See the Dockerfile header.
  # ---------------------------------------------------------------------
  build:
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Generate five matrix entries (3 OSes x 2 arches, minus 1):
        #   linux/amd64   linux/arm64
        #   darwin/amd64  darwin/arm64   (Apple Silicon + Intel)
        #   windows/amd64                  (added 2026-07-16; arm64 deliberately omitted — few real users yet)
        #
        # Darwin support added earlier in the day 2026-07-16.
        # Windows support added 2026-07-16: same Go cross-compile
        # pipeline, but `.exe` extension on the binary and `.zip`
        # instead of `.tar.gz` (Windows users expect zips; tar.gz
        # also works on Windows 10+ via the bsdtar PowerShell module,
        # but zip is the universal default).
        #
        # GH Actions expands ${{ matrix.os }} / ${{ matrix.arch }}
        # reliably across step-level env blocks, run blocks, and
        # uses blocks. We previously tried nested-object matrix
        # (matrix.target.goos / matrix.target.goarch) — first
        # release run (29486922198) showed it rendered
        # inconsistently for arm64, so this flat form was chosen.
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    env:
      GOOS: ${{ matrix.os }}
      GOARCH: ${{ matrix.arch }}
      CGO_ENABLED: "0"
      # VERSION is exported job-wide so every step can shell-expand
      # ${VERSION}. First iteration put env on the build step only —
      # the staging step then wrote mcp-confluence__linux_amd64.tar.gz
      # (empty ${VERSION}) and the upload step couldn't find the file
      # the upload-action path expected. Moved here 2026-07-16.
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build standalone binary (${{ matrix.os }}/${{ matrix.arch }})
        run: |
          mkdir -p bin
          # Windows binary carries the .exe suffix; everything else
          # is just `mcp-confluence`. Naming matters for Windows PATH
          # resolution and for shell-launcher double-click behavior.
          BINARY="mcp-confluence"
          if [ "${GOOS}" = "windows" ]; then BINARY="mcp-confluence.exe"; fi
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "bin/${BINARY}" \
            ./cmd/mcp-confluence
          # Cross-compiled binaries (arm64, darwin, windows) can't
          # be exec'd on the amd64 Linux runner, so we can't
          # sanity-check with --version here. The upload succeeding
          # is sufficient proof the binary exists. (Local macOS/
          # Linux/Windows devs can `make build` to rebuild for
          # their arch.)
          ls -la bin/
          file bin/${BINARY} 2>/dev/null || true

      - name: Stage release artifacts (${{ matrix.os }}/${{ matrix.arch }})
        run: |
          mkdir -p release
          # Per-platform archive. Layout inside the archive is a
          # single binary at the root, so unzipping / untarring
          # gives a directly-runnable artifact.
          #
          # Windows users get a .zip with mcp-confluence.exe;
          # everyone else gets the standard .tar.gz.
          if [ "${GOOS}" = "windows" ]; then
            # `zip` isn't pre-installed on ubuntu-latest runners.
            # Install it (idempotent; uses apt-get if zip is missing).
            if ! command -v zip >/dev/null 2>&1; then
              sudo apt-get update -qq && sudo apt-get install -y -qq zip
            fi
            (cd bin && zip -9 "../release/mcp-confluence_${VERSION}_${GOOS}_${GOARCH}.zip" mcp-confluence.exe)
          else
            tar -C bin -czf "release/mcp-confluence_${VERSION}_${GOOS}_${GOARCH}.tar.gz" mcp-confluence
          fi
          ls -la release/

      - name: Upload standalone binary archive
        uses: actions/upload-artifact@v4
        with:
          name: mcp-confluence-${{ matrix.os }}-${{ matrix.arch }}
          # Glob covers both extensions: .zip on windows, .tar.gz
          # everywhere else. upload-artifact@v4 supports a single
          # glob OR a list of files; a single glob is sufficient here.
          path: release/mcp-confluence_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}.{tar.gz,zip}
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # OCI image build: docker buildx on the runner is fine for a single
  # arch (amd64) and produces the same distroless static binary
  # `make image` does. The image is exported via `docker save` so
  # consumers without a registry can `docker load -i` it.
  # ---------------------------------------------------------------------
  oci:
    name: oci image (amd64, distroless)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OCI image (Dockerfile path; same artifact as pack + Paketo)
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${VERSION}" \
            --tag "mcp-confluence:${VERSION}" \
            --load \
            .
          docker images --format '{{.Repository}}:{{.Tag}} {{.Size}}'

      - name: Export OCI image to a docker-loadable tarball
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p release
          docker save \
            -o "release/mcp-confluence_${VERSION}.oci.tar" \
            "mcp-confluence:${VERSION}"
          ls -la release/

      - name: Upload OCI image tarball
        uses: actions/upload-artifact@v4
        with:
          name: mcp-confluence-oci
          path: release/mcp-confluence_${{ github.ref_name }}.oci.tar
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Aggregate: download all artifacts, compute sha256sums, create the
  # GitHub Release with everything attached.
  # ---------------------------------------------------------------------
  publish:
    name: publish GitHub Release
    needs: [build, oci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Compute sha256sums
        working-directory: release
        run: |
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Generate release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          ## mcp-confluence ${VERSION}

          Tag-driven release built via GitHub Actions. The release
          workflow is in \`.github/workflows/release.yml\`.

          ### Download

          | Asset | What it is | When to use it |
          | ----- | ---------- | -------------- |
          | \`mcp-confluence_${VERSION}_linux_amd64.tar.gz\` | static binary (amd64) | Linux x86_64 hosts — \`tar -xzf\` and run |
          | \`mcp-confluence_${VERSION}_linux_arm64.tar.gz\` | static binary (arm64) | Linux aarch64 hosts (Graviton, Raspberry Pi 5, …) |
          | \`mcp-confluence_${VERSION}_darwin_amd64.tar.gz\` | static binary (Intel Mac) | macOS 10.13+ x86_64 |
          | \`mcp-confluence_${VERSION}_darwin_arm64.tar.gz\` | static binary (Apple Silicon) | macOS 11+ M1/M2/M3/M4 |
          | \`mcp-confluence_${VERSION}_windows_amd64.zip\` | static binary (.exe) | Windows 10/11/Server 2019+ x86_64 |
          | \`mcp-confluence_${VERSION}.oci.tar\` | OCI image (distroless, amd64) | \`docker load -i mcp-confluence_${VERSION}.oci.tar\` then \`docker run\` |
          | \`sha256sums.txt\` | checksums for every asset above | verify integrity before deploy |

          ### Install

          \`\`\`sh
          # Standalone binary (linux/amd64)
          curl -L -o mcp-confluence.tar.gz \\
            https://github.com/${{ github.repository }}/releases/download/${VERSION}/mcp-confluence_${VERSION}_linux_amd64.tar.gz
          tar -xzf mcp-confluence.tar.gz
          ./mcp-confluence --version    # should print: mcp-confluence version ${VERSION}
          \`\`\`

          \`\`\`sh
          # OCI image
          docker load -i mcp-confluence_${VERSION}.oci.tar
          docker run --rm -i \\
            -e ATLASSIAN_SITE_NAME=… -e ATLASSIAN_USER_EMAIL=… -e ATLASSIAN_API_TOKEN=… \\
            mcp-confluence:${VERSION} stdio
          \`\`\`

          ### Verify

          \`\`\`sh
          sha256sum -c sha256sums.txt   # from the downloaded release tarball
          \`\`\`

          ### !!! WARNING — EDITING FUNCTIONS MIGHT NOT BE COMPLETELY FINISHED !!!

          The 9 write-side subcommands (\`post\`, \`put\`, \`patch\`,
          \`delete\`, \`post_markdown\`, \`put_markdown\`,
          \`upload_attachment\`, \`delete_attachment\`, \`upload_drawio\`)
          are reported as "complete" by the test suite, but they have
          NOT been end-to-end validated against every edge case of the
          Confluence Cloud REST API. Always dry-run on a test page first.
          See \`mcp-confluence --help\` for the same warning.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "mcp-confluence ${{ github.ref_name }}"
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            release/mcp-confluence_${{ github.ref_name }}_linux_amd64.tar.gz
            release/mcp-confluence_${{ github.ref_name }}_linux_arm64.tar.gz
            release/mcp-confluence_${{ github.ref_name }}_darwin_amd64.tar.gz
            release/mcp-confluence_${{ github.ref_name }}_darwin_arm64.tar.gz
            release/mcp-confluence_${{ github.ref_name }}_windows_amd64.zip
            release/mcp-confluence_${{ github.ref_name }}.oci.tar
            release/sha256sums.txt
